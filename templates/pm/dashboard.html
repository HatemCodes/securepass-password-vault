<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.12.0/cdn.min.js" defer></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Navbar -->
  <nav class="bg-blue-600 text-white shadow-lg fixed w-full top-0 left-0 z-50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">

      <!-- Center: Website Name -->
      <div class="absolute left-1/2 transform -translate-x-1/2">
        <i class="fas fa-lock text-white text-2xl"></i>
        <span class="text-2xl font-bold">SecurePass</span>
      </div>

      <!-- Right: Navigation Buttons -->
      <div class="ml-auto flex space-x-4">
        <a href="base.html" class="bg-white text-blue-500 font-semibold px-4 py-2 rounded-lg hover:bg-gray-100">
          Logout
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-28 px-4">
    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl p-10">
      <h1 class="text-4xl font-bold text-blue-600 mb-2">Welcome back,</h1>
      <h2 class="text-3xl text-gray-700 font-bold mb-6" id="username">{{ username }}</h2>

      <div class="grid md:grid-cols-3 gap-6">
        <a href="caesar.html" class="bg-blue-50 border border-blue-200 p-6 rounded-xl hover:bg-blue-100 transition text-center shadow-sm">
          <i class="fas fa-key text-3xl text-blue-500 mb-2"></i>
          <p class="text-lg font-medium mt-2">Caesar Cipher</p>
        </a>
        <a href="rsa.html" class="bg-blue-50 border border-blue-200 p-6 rounded-xl hover:bg-blue-100 transition text-center shadow-sm">
          <i class="fas fa-lock text-3xl text-blue-500 mb-2"></i>
          <p class="text-lg font-medium mt-2">RSA Encryption</p>
        </a>
        <a href="frequency.html" class="bg-blue-50 border border-blue-200 p-6 rounded-xl hover:bg-blue-100 transition text-center shadow-sm">
          <i class="fas fa-chart-bar text-3xl text-blue-500 mb-2"></i>
          <p class="text-lg font-medium mt-2">Frequency Analysis</p>
        </a>
        <a href="tools.html" class="bg-blue-50 border border-blue-200 p-6 rounded-xl hover:bg-blue-100 transition text-center shadow-sm">
          <i class="fas fa-wrench text-3xl text-blue-500 mb-2"></i>
          <p class="text-lg font-medium mt-2">Crypto Tools</p>
        </a>
        <a href="vault.html" class="bg-blue-50 border border-blue-200 p-6 rounded-xl hover:bg-blue-100 transition text-center shadow-sm">
          <i class="fas fa-vault text-3xl text-blue-500 mb-2"></i>
          <p class="text-lg font-medium mt-2">My Vault</p>
        </a>
      </div>
      
    </div>
  </main>


</body>
</html>
