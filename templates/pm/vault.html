<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecurePass - Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.12.0/cdn.min.js" defer></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Navbar -->
  <nav class="bg-blue-600 text-white shadow-lg fixed w-full top-0 left-0 z-50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <div class="absolute left-1/2 transform -translate-x-1/2">
        <i class="fas fa-lock text-white text-2xl"></i>
        <span class="text-2xl font-bold">SecurePass</span>
      </div>
      <div class="ml-auto flex space-x-4">
        <a href="dashboard.html" class="bg-white text-blue-500 font-semibold px-4 py-2 rounded-lg hover:bg-gray-100">
          Home
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-28 px-6 max-w-5xl mx-auto" x-data="{ showForm: false }">
    <div class="bg-white shadow-xl rounded-2xl p-8">
      <h2 class="text-4xl font-bold text-blue-600 mb-8 text-center">
        🔐 Your Vault
      </h2>

      <!-- Vault Table -->
      <div class="overflow-x-auto rounded-lg border border-blue-100">
        <table class="min-w-full text-sm text-center">
          <thead class="bg-blue-600 text-white">
            <tr>
              <th class="px-6 py-3 font-medium tracking-wide">Service</th>
              <th class="px-6 py-3 font-medium tracking-wide">Username</th>
              <th class="px-6 py-3 font-medium tracking-wide">Password</th>
              <th class="px-6 py-3 font-medium tracking-wide">Edit</th>
              <th class="px-6 py-3 font-medium tracking-wide">Delete</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <!-- Toggle Button -->
      <div class="mt-10 text-center">
        <button @click="showForm = !showForm"
          class="inline-block bg-blue-600 text-white font-semibold px-6 py-3 rounded-xl hover:bg-blue-700 transition">
          ➕ Add New Service
        </button>
      </div>

      <!-- Add Service Form -->
      <form x-show="showForm" x-transition @submit.prevent class="mt-8 space-y-6 max-w-xl mx-auto border-t pt-6">
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Service</label>
          <input type="text" name="service" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="e.g. Gmail" required>
        </div>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Username</label>
          <input type="text" name="username" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="e.g. john.doe" required>
        </div>
        <div x-data="{ showPassword: false }">
          <label class="block mb-1 text-sm font-medium text-gray-700">Password</label>
          <div class="relative">
            <input :type="showPassword ? 'text' : 'password'" name="password"
                   class="w-full px-4 py-2 pr-12 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="••••••••" required>
            <button type="button" @click="showPassword = !showPassword"
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-blue-500 text-sm hover:underline">
              <span x-text="showPassword ? 'Hide' : 'Show'"></span>
            </button>
          </div>
        </div>
        <div class="text-center">
          <button type="submit" class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600 transition">
            ✅ Save Service
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- Your existing code above remains the same -->

<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("entryRow", ({ id, service, username, password }) => ({
      id,
      service,
      username,
      password,
      edit: false,
      async saveEdit() {
        if (!this.service || !this.username || !this.password) {
          alert("All fields are required.");
          return;
        }
        if (/^\d+$/.test(this.password)) {
          alert("Password cannot consist of numbers only.");
          return;
        }
        const res = await fetch(`/vault/${this.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            service: this.service,
            username: this.username,
            password: this.password
          })
        });
        if (res.ok) {
          this.edit = false;
          fetchVault();
        } else {
          alert("Failed to update entry.");
        }
      },
      async deleteEntry() {
        if (!confirm("Are you sure you want to delete this entry?")) return;
        const res = await fetch(`/vault/${this.id}`, { method: "DELETE" });
        if (res.ok) {
          fetchVault();
        } else {
          alert("Failed to delete.");
        }
      }
    }));
  });

  document.addEventListener("DOMContentLoaded", () => {
    fetchVault();
    const form = document.querySelector("form");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const service = form.service.value.trim();
      const username = form.username.value.trim();
      const password = form.password.value.trim();

      if (!service || !username || !password) {
        alert("Please fill out all fields.");
        return;
      }

      if (/^\d+$/.test(password)) {
        alert("Password cannot consist of numbers only.");
        return;
      }

      const response = await fetch("/vault", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ service, username, password })
      });

      if (response.ok) {
        alert("Service saved!");
        form.reset();
        fetchVault();
      } else {
        const err = await response.json();
        alert(err.error || "Error saving service.");
      }
    });
  });

  async function fetchVault() {
    const response = await fetch("/vault");
    const data = await response.json();
    const tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    data.forEach(entry => {
      const row = document.createElement("tr");
      row.className = "hover:bg-blue-50 transition border-t text-center align-middle";
      
      // Initialize Alpine.js with the data for each row
      row.setAttribute("x-data", `entryRow(${JSON.stringify(entry)})`);
      
      row.innerHTML = `
        <td class="px-6 py-4 text-center">
          <template x-if="!edit">
            <span x-text="service"></span>
          </template>
          <template x-if="edit">
            <input x-model="service" class="border rounded px-2 py-1 w-full" />
          </template>
        </td>
        <td class="px-6 py-4 text-center">
          <template x-if="!edit">
            <span x-text="username"></span>
          </template>
          <template x-if="edit">
            <input x-model="username" class="border rounded px-2 py-1 w-full" />
          </template>
        </td>
        <td class="px-6 py-4 text-center font-mono text-gray-700" x-data="{ showPass: false }">
          <template x-if="!edit">
            <div class="flex items-center justify-center space-x-2">
              <span x-text="showPass ? password : password.replace(/./g, '•')"></span>
              <button type="button" @click="showPass = !showPass">
                <i :class="showPass ? 'fas fa-eye-slash' : 'fas fa-eye'" class="text-blue-500"></i>
              </button>
            </div>
          </template>
          <template x-if="edit">
            <input x-model="password" class="border rounded px-2 py-1 w-full" type="text" />
          </template>
        </td>
        <td class="px-6 py-4 space-x-2 text-center">
          <template x-if="!edit">
            
            <button @click="edit = true" class="text-blue-600 hover:underline">Edit</button>
            
          </template>
          <template x-if="edit">
            <button @click="saveEdit()" class="text-green-600 hover:underline">Save</button>
            <button @click="edit = false" class="text-gray-500 hover:underline">Cancel</button>
          </template>
        </td>
        <td class="px-6 py-4 space-x-2 text-center">
          <template x-if="!edit">
            <button @click="deleteEntry()" class="text-red-500 hover:underline">Delete</button>
          </template>
          
          
        </td>
      `;
      
      tbody.appendChild(row);
    });
  }

</script>

</body>
</html>
